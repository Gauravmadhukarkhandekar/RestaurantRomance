<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Partner Portal | Pike Place Pair</title>
    <style>
        :root {
            --indigo: #1A237E;
            --copper: #B87333;
            --deep: #0F0F1B;
            --surface: #1E1E2E;
            --text: #FFFFFF;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--deep);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: var(--surface);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }
        h1 {
            color: var(--copper);
            margin-bottom: 8px;
            text-align: center;
        }
        p {
            color: #A0A0B0;
            text-align: center;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #A0A0B0;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: #12121F;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--indigo), var(--copper));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Partner Portal</h1>
        <p>Join Seattle's most exclusive dating network.</p>
        
        <form>
            <div class="form-group">
                <label>Restaurant Name</label>
                <input type="text" placeholder="e.g. Pike Place Grill">
            </div>
            <div class="form-group">
                <label>Seattle Neighborhood</label>
                <select>
                    <option>Belltown</option>
                    <option>Capitol Hill</option>
                    <option>Ballard</option>
                    <option>Queen Anne</option>
                    <option>Pike Place Market</option>
                </select>
            </div>
            <div class="form-group">
                <label>Cuisine Type</label>
                <input type="text" placeholder="e.g. Seafood, Italian">
            </div>
            <div class="form-group">
                <label>Business License (UBI)</label>
                <input type="text" placeholder="XXX-XXX-XXX">
            </div>
            <div class="form-group">
                <label>Why should couples visit you?</label>
                <textarea rows="3" placeholder="Tell us about your ambiance..."></textarea>
            </div>
            <button type="button" onclick="alert('Application submitted! We will verify your business shortly.')">Apply to Join</button>
        </form>
    </div>
</body>
</html>
